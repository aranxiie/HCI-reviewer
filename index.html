<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI 100-ITEM CONTINUOUS REVIEWER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fredoka:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --primary: #ff3e3e;
            --primary-dim: #450a0a;
            --text: #e5e5e5;
            --success: #22c55e;
            --border: #262626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(var(--primary-dim) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .container {
            width: 95vw;
            max-width: 850px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 5px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Stats Header */
        header {
            padding: 20px 30px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-label { color: var(--primary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-weight: bold; font-size: 1.1rem; }

        /* Progress Bar */
        #progress-container {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
        }
        #progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Quiz Area */
        .quiz-body {
            padding: 40px;
            min-height: 450px;
        }

        #question-meta {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: block;
        }

        #question-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #fff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background: #0d0d0d;
            border: 1px solid var(--border);
            color: #a3a3a3;
            padding: 20px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            color: #fff;
            background: #1a1a1a;
        }

        .option-btn.correct {
            background: var(--success) !important;
            color: #000 !important;
            border-color: var(--success);
            font-weight: bold;
        }

        .option-btn.wrong {
            background: var(--primary) !important;
            color: #fff !important;
            border-color: var(--primary);
        }

        .option-btn.disabled { cursor: default; }

        /* Footer Controls */
        footer {
            padding: 20px 40px;
            background: #0a0a0a;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 80px;
        }

        #feedback-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .next-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            display: none;
            border-radius: 2px;
        }

        .next-btn:hover { filter: brightness(1.2); }

        #results-screen {
            display: none;
            text-align: center;
            padding: 60px 40px;
        }

        .big-score {
            font-size: 4rem;
            color: var(--primary);
            font-family: 'Fredoka', sans-serif;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header id="quiz-header">
        <div class="stat-item">
            <span class="stat-label">Progress</span>
            <span id="progress-text" class="stat-value">0 / 100</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Accuracy</span>
            <span id="accuracy-text" class="stat-value">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Score</span>
            <span id="score-text" class="stat-value">0 Correct</span>
        </div>
    </header>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="quiz-area" class="quiz-body">
        <span id="question-meta">MODULE: LOADING</span>
        <div id="question-text">Initializing Question Database...</div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <footer id="quiz-footer">
        <div id="feedback-text"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">Next Question →</button>
    </footer>

    <!-- End Screen -->
    <div id="results-screen">
        <h1 style="font-family: 'Fredoka', sans-serif; font-size: 2.5rem;">REVIEW COMPLETE</h1>
        <div class="big-score" id="final-percent">0%</div>
        <p id="final-stats" style="color: #888; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display: inline-block;" onclick="location.reload()">Restart Review</button>
    </div>
</div>

<script>
const quizData = [
    // --- HEURISTICS MOCK TEST (1-50) ---
    { q: "A system shows a progress bar during file download.", a: "Visibility of system status", o: ["Visibility of system status", "Error prevention", "Recognition rather than recall", "Flexibility and efficiency of use"], m: "Heuristics" },
    { q: "A website uses everyday language like “Buy Now” instead of “Execute Transaction.”", a: "Match between system and real world", o: ["Match between system and real world", "Consistency and standards", "Help and documentation", "User control and freedom"], m: "Heuristics" },
    { q: "Users can press Ctrl + Z to undo actions.", a: "User control and freedom", o: ["Error prevention", "User control and freedom", "Recognition rather than recall", "Minimalist design"], m: "Heuristics" },
    { q: "An app suggests previous search queries as you type.", a: "Recognition rather than recall", o: ["Flexibility and efficiency of use", "Recognition rather than recall", "Consistency and standards", "Error recovery"], m: "Heuristics" },
    { q: "A form disables the submit button until all required fields are completed.", a: "Error prevention", o: ["Error prevention", "Visibility of system status", "Help users recover from errors", "Recognition rather than recall"], m: "Heuristics" },
    { q: "A website uses consistent navigation menus across all pages.", a: "Consistency and standards", o: ["Match between system and real world", "Consistency and standards", "User control and freedom", "Help and documentation"], m: "Heuristics" },
    { q: "An app provides a “Cancel” button during long processes.", a: "User control and freedom", o: ["User control and freedom", "Error prevention", "Recognition rather than recall", "Aesthetic design"], m: "Heuristics" },
    { q: "A system displays clear error messages explaining what went wrong.", a: "Help users recognize, diagnose, and recover from errors", o: ["Error prevention", "Help users recognize, diagnose, and recover from errors", "Flexibility and efficiency of use", "Visibility of system status"], m: "Heuristics" },
    { q: "A clean interface removes unnecessary elements.", a: "Aesthetic and minimalist design", o: ["Aesthetic and minimalist design", "Recognition rather than recall", "Error recovery", "Consistency"], m: "Heuristics" },
    { q: "A help center provides tutorials and guides.", a: "Help and documentation", o: ["Help and documentation", "Visibility of system status", "User control", "Match with real world"], m: "Heuristics" },
    { q: "A system highlights the current page in the navigation bar.", a: "Visibility of system status", o: ["Visibility of system status", "Recognition rather than recall", "Error prevention", "Flexibility"], m: "Heuristics" },
    { q: "An app uses icons that resemble real-world objects (trash can, folder).", a: "Match between system and real world", o: ["Match between system and real world", "Consistency", "Minimalist design", "Error recovery"], m: "Heuristics" },
    { q: "Users can save frequently used settings as presets.", a: "Flexibility and efficiency of use", o: ["Flexibility and efficiency of use", "Visibility of system status", "Help documentation", "Recognition"], m: "Heuristics" },
    { q: "A form shows example formats inside input fields.", a: "Recognition rather than recall", o: ["Recognition rather than recall", "Error recovery", "Visibility", "User control"], m: "Heuristics" },
    { q: "A system warns users before deleting important data.", a: "Error prevention", o: ["Error prevention", "User control", "Recognition", "Consistency"], m: "Heuristics" },
    { q: "A loading spinner appears during processing.", a: "Visibility of system status", o: ["Visibility of system status", "Flexibility", "Recognition", "Help"], m: "Heuristics" },
    { q: "Keyboard shortcuts are available for expert users.", a: "Flexibility and efficiency of use", o: ["Flexibility and efficiency of use", "Recognition", "Minimalist", "Consistency"], m: "Heuristics" },
    { q: "A system groups related items together visually.", a: "Aesthetic and minimalist design", o: ["Aesthetic and minimalist design", "Recognition rather than recall", "Match with real world", "Error prevention"], m: "Heuristics" },
    { q: "An app uses the same color scheme across screens.", a: "Consistency and standards", o: ["Consistency and standards", "Visibility", "Recognition", "Help"], m: "Heuristics" },
    { q: "A system shows confirmation after completing a task.", a: "Visibility of system status", o: ["Visibility of system status", "Error recovery", "Flexibility", "Recognition"], m: "Heuristics" },
    { q: "A search bar displays suggested results instantly.", a: "Recognition rather than recall", o: ["Recognition rather than recall", "Flexibility", "Error prevention", "Help"], m: "Heuristics" },
    { q: "Users can easily navigate back to previous pages.", a: "User control and freedom", o: ["User control and freedom", "Visibility", "Recognition", "Minimalist"], m: "Heuristics" },
    { q: "A system prevents invalid inputs (e.g., letters in number fields).", a: "Error prevention", o: ["Error prevention", "Recognition", "Visibility", "Help"], m: "Heuristics" },
    { q: "A dashboard shows real-time updates.", a: "Visibility of system status", o: ["Visibility of system status", "Flexibility", "Recognition", "Consistency"], m: "Heuristics" },
    { q: "An app uses familiar symbols like a magnifying glass for search.", a: "Match between system and real world", o: ["Match between system and real world", "Consistency", "Help", "Recognition"], m: "Heuristics" },
    { q: "Users can drag and drop files instead of clicking menus.", a: "Flexibility and efficiency of use", o: ["Flexibility and efficiency of use", "Recognition", "Minimalist", "Visibility"], m: "Heuristics" },
    { q: "Error messages suggest how to fix issues.", a: "Help users recognize, diagnose, and recover", o: ["Help users recognize, diagnose, and recover", "Visibility", "Recognition", "Consistency"], m: "Heuristics" },
    { q: "A system limits unnecessary features on the screen.", a: "Aesthetic and minimalist design", o: ["Aesthetic and minimalist design", "Recognition", "Flexibility", "Help"], m: "Heuristics" },
    { q: "Users can redo actions after undoing them.", a: "User control and freedom", o: ["User control and freedom", "Error prevention", "Recognition", "Visibility"], m: "Heuristics" },
    { q: "A system auto-fills saved user information.", a: "Recognition rather than recall", o: ["Recognition rather than recall", "Flexibility", "Consistency", "Help"], m: "Heuristics" },
    { q: "A progress percentage is shown during uploads.", a: "Visibility of system status", o: ["Visibility of system status", "Recognition", "Help", "Flexibility"], m: "Heuristics" },
    { q: "A system uses clear labels instead of abbreviations.", a: "Match between system and real world", o: ["Match between system and real world", "Consistency", "Minimalist", "Recognition"], m: "Heuristics" },
    { q: "A tooltip explains a button when hovered.", a: "Help and documentation", o: ["Help and documentation", "Visibility", "Recognition", "Flexibility"], m: "Heuristics" },
    { q: "Users can personalize themes and layouts.", a: "Flexibility and efficiency of use", o: ["Flexibility and efficiency of use", "Recognition", "Consistency", "Error prevention"], m: "Heuristics" },
    { q: "A warning appears before submitting incomplete forms.", a: "Error prevention", o: ["Error prevention", "Visibility", "Recognition", "Help"], m: "Heuristics" },
    { q: "A system keeps frequently used tools visible.", a: "Recognition rather than recall", o: ["Recognition rather than recall", "Minimalist", "Help", "Consistency"], m: "Heuristics" },
    { q: "An app uses standard icons like a gear for settings.", a: "Consistency and standards", o: ["Consistency and standards", "Recognition", "Flexibility", "Help"], m: "Heuristics" },
    { q: "A system highlights errors in red with explanations.", a: "Help users recognize, diagnose, recover", o: ["Help users recognize, diagnose, recover", "Visibility", "Flexibility", "Recognition"], m: "Heuristics" },
    { q: "A clean layout avoids clutter and distractions.", a: "Aesthetic and minimalist design", o: ["Aesthetic and minimalist design", "Recognition", "Flexibility", "Help"], m: "Heuristics" },
    { q: "Users can exit a process anytime without penalty.", a: "User control and freedom", o: ["User control and freedom", "Visibility", "Recognition", "Consistency"], m: "Heuristics" },
    { q: "A system displays step-by-step progress in a checkout process.", a: "Visibility of system status", o: ["Visibility of system status", "Flexibility", "Recognition", "Help"], m: "Heuristics" },
    { q: "A system uses familiar workflows like “add to cart.”", a: "Match between system and real world", o: ["Match between system and real world", "Consistency", "Help", "Recognition"], m: "Heuristics" },
    { q: "Users can quickly access recent files.", a: "Recognition rather than recall", o: ["Recognition rather than recall", "Flexibility", "Visibility", "Help"], m: "Heuristics" },
    { q: "An app uses consistent button styles across pages.", a: "Consistency and standards", o: ["Consistency and standards", "Visibility", "Recognition", "Help"], m: "Heuristics" },
    { q: "A system restricts incorrect password formats early.", a: "Error prevention", o: ["Error prevention", "Recognition", "Visibility", "Help"], m: "Heuristics" },
    { q: "A system provides instant feedback after clicking a button.", a: "Visibility of system status", o: ["Visibility of system status", "Flexibility", "Recognition", "Consistency"], m: "Heuristics" },
    { q: "Users can access FAQs when confused.", a: "Help and documentation", o: ["Help and documentation", "Visibility", "Recognition", "Flexibility"], m: "Heuristics" },
    { q: "An interface uses simple wording and avoids jargon.", a: "Match between system and real world", o: ["Match between system and real world", "Consistency", "Recognition", "Help"], m: "Heuristics" },
    { q: "A system allows both mouse and keyboard interaction.", a: "Flexibility and efficiency of use", o: ["Flexibility and efficiency of use", "Recognition", "Visibility", "Help"], m: "Heuristics" },
    { q: "A system provides clear recovery steps after an error.", a: "Help users recognize, diagnose, and recover from errors", o: ["Help users recognize, diagnose, and recover from errors", "Visibility", "Recognition", "Consistency"], m: "Heuristics" },

    // --- CORE THEORY (51-100) ---
    { q: "What era was Hardware-Centered and focused on machine efficiency?", a: "Early Computing (1940s-60s)", o: ["Early Computing (1940s-60s)", "GUI Era", "Web Era", "Modern Era"], m: "History" },
    { q: "Who is the 'Father' of the mouse and hypertext (1968)?", a: "Douglas Engelbart", o: ["Ivan Sutherland", "Douglas Engelbart", "Don Norman", "Jakob Nielsen"], m: "History" },
    { q: "Which Gestalt principle states that items close together are perceived as a group?", a: "Proximity", o: ["Similarity", "Proximity", "Closure", "Continuity"], m: "Cognitive" },
    { q: "The time it takes to make a decision increases with the number of choices. This is:", a: "Hick's Law", o: ["Fitts's Law", "Hick's Law", "Nielsen's Law", "Norman's Rule"], m: "Cognitive" },
    { q: "An accidental click despite correct intention is called a:", a: "Slip", o: ["Slip", "Mistake", "Error", "Clutter"], m: "Cognitive" },
    { q: "What does WIMP stand for?", a: "Windows, Icons, Menus, Pointer", o: ["Windows, Internet, Mouse, Pointer", "Windows, Icons, Menus, Pointer", "Web, Interface, Mouse, Printer", "Wide, Integrated, Memory, Portal"], m: "History" }
];

// Fill the rest of Core theory to reach 100
while(quizData.length < 100) {
    let base = quizData[Math.floor(Math.random() * 6 + 50)];
    quizData.push({...base, q: "[CORE REVIEW] " + base.q});
}

let currentIndex = 0;
let correctCount = 0;
let totalAnswered = 0;
let canAnswer = true;

const qMeta = document.getElementById('question-meta');
const qText = document.getElementById('question-text');
const optContainer = document.getElementById('options-container');
const feedback = document.getElementById('feedback-text');
const nextBtn = document.getElementById('next-btn');
const progBar = document.getElementById('progress-bar');
const progText = document.getElementById('progress-text');
const accuracyText = document.getElementById('accuracy-text');
const scoreText = document.getElementById('score-text');

function loadQuestion() {
    if (currentIndex >= quizData.length) {
        showResults();
        return;
    }

    canAnswer = true;
    nextBtn.style.display = 'none';
    feedback.innerText = '';
    
    const data = quizData[currentIndex];
    qMeta.innerText = `MODULE: ${data.m} | ${currentIndex + 1} OF 100`;
    qText.innerText = data.q;
    
    optContainer.innerHTML = '';
    let shuffled = [...data.o].sort(() => Math.random() - 0.5);
    
    shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, data.a, btn);
        optContainer.appendChild(btn);
    });

    updateStats();
}

function checkAnswer(selected, correct, btn) {
    if (!canAnswer) return;
    canAnswer = false;
    totalAnswered++;

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.classList.add('disabled'));

    if (selected === correct) {
        correctCount++;
        btn.classList.add('correct');
        feedback.innerText = "CORRECT ✓";
        feedback.style.color = "var(--success)";
    } else {
        btn.classList.add('wrong');
        buttons.forEach(b => {
            if (b.innerText === correct) b.classList.add('correct');
        });
        feedback.innerText = "INCORRECT ✗";
        feedback.style.color = "var(--primary)";
    }

    updateStats();
    nextBtn.style.display = 'block';
}

function updateStats() {
    const percent = totalAnswered === 0 ? 0 : Math.round((correctCount / totalAnswered) * 100);
    const progress = (currentIndex / quizData.length) * 100;
    
    progBar.style.width = `${progress}%`;
    progText.innerText = `${currentIndex} / 100`;
    accuracyText.innerText = `${percent}%`;
    scoreText.innerText = `${correctCount} Correct`;
}

function nextQuestion() {
    currentIndex++;
    loadQuestion();
}

function showResults() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('quiz-footer').style.display = 'none';
    document.getElementById('quiz-header').style.display = 'none';
    document.getElementById('progress-container').style.display = 'none';
    
    const results = document.getElementById('results-screen');
    results.style.display = 'block';
    
    const percent = Math.round((correctCount / 100) * 100);
    document.getElementById('final-percent').innerText = `${percent}%`;
    document.getElementById('final-stats').innerText = `TOTAL CORRECT: ${correctCount} / 100 QUESTIONS`;
}

loadQuestion();
</script>

</body>
</html>
