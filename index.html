<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI 100-ITEM SITUATIONAL REVIEWER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fredoka:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --panel: #18181b;
            --primary: #dc2626; /* Cherry Red */
            --primary-dim: #450a0a;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --success: #22c55e;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(var(--primary-dim) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        .container {
            width: 95vw;
            max-width: 850px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 6px solid var(--primary);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 30px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-label { color: var(--primary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .stat-value { font-weight: bold; font-size: 1.1rem; }

        #progress-container { width: 100%; height: 4px; background: #27272a; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        .quiz-body { padding: 40px; min-height: 450px; }
        #question-meta { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 0.8rem; margin-bottom: 10px; display: block; font-weight: 700; }
        #question-text { font-size: 1.4rem; font-weight: 700; line-height: 1.4; margin-bottom: 30px; color: #fff; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: #09090b;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 18px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            border-radius: 6px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            color: #fff;
            background: #111;
        }

        .option-btn.correct { background: var(--success) !important; color: #000 !important; border-color: var(--success); font-weight: bold; }
        .option-btn.wrong { background: var(--primary) !important; color: #fff !important; border-color: var(--primary); }
        .option-btn.disabled { cursor: default; }

        footer {
            padding: 20px 40px;
            background: #09090b;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 90px;
        }

        #feedback-text { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: bold; }

        .next-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 28px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            display: none;
            border-radius: 4px;
        }

        .next-btn:hover { filter: brightness(1.2); }

        #results-screen { display: none; text-align: center; padding: 60px 40px; }
        .big-score { font-size: 5rem; color: var(--primary); font-family: 'Fredoka', sans-serif; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <header id="quiz-header">
        <div class="stat-item">
            <span class="stat-label">Progress</span>
            <span id="progress-text" class="stat-value">0 / 100</span>
        </div>
        <div class="stat-item" style="text-align: center;">
            <span class="stat-label">Accuracy</span>
            <span id="accuracy-text" class="stat-value">0%</span>
        </div>
        <div class="stat-item" style="text-align: right;">
            <span class="stat-label">Correct</span>
            <span id="score-text" class="stat-value">0</span>
        </div>
    </header>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="quiz-area" class="quiz-body">
        <span id="question-meta">MODULE: LOADING</span>
        <div id="question-text">Initializing Scenario Database...</div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <footer id="quiz-footer">
        <div id="feedback-text"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">Next Item →</button>
    </footer>

    <div id="results-screen">
        <h1 style="font-family: 'Fredoka', sans-serif; font-size: 2.5rem;">REVIEW COMPLETE</h1>
        <div class="big-score" id="final-percent">0%</div>
        <p id="final-stats" style="color: #a1a1aa; margin-bottom: 30px; font-size: 1.1rem;"></p>
        <button class="next-btn" style="display: inline-block;" onclick="location.reload()">Restart Review</button>
    </div>
</div>

<script>
const rawQuestions = [
    // --- 50 SITUATIONAL QUESTIONS PROVIDED ---
    { q: "A website shows a loading spinner while processing a request. What heuristic is applied?", a: "Visibility of System Status", o: ["Error Prevention", "Visibility of System Status", "Consistency", "Flexibility"], m: "Heuristics" },
    { q: "A mobile app uses a trash bin icon for deleting files. What principle is this?", a: "Match between system and real world", o: ["Recognition rather than recall", "Match between system and real world", "Error prevention", "Feedback"], m: "Heuristics" },
    { q: "A form prevents submission unless all required fields are filled.", a: "Error Prevention", o: ["Feedback", "Error Prevention", "Consistency", "Closure"], m: "Heuristics" },
    { q: "A system allows users to undo a deleted file.", a: "User control and freedom", o: ["Flexibility", "User control and freedom", "Feedback", "Learnability"], m: "Heuristics" },
    { q: "A website keeps layout and colors the same across all pages.", a: "Consistency", o: ["Recognition", "Consistency", "Feedback", "Minimalism"], m: "Heuristics" },
    { q: "A search bar suggests keywords as you type.", a: "Recognition rather than recall", o: ["Recall", "Recognition rather than recall", "Error prevention", "Feedback"], m: "Heuristics" },
    { q: "A cluttered interface overwhelms users. What principle is violated?", a: "Minimalist design", o: ["Minimalist design", "Feedback", "Flexibility", "Closure"], m: "Heuristics" },
    { q: "A progress bar appears during file upload.", a: "Informative feedback", o: ["Error prevention", "Informative feedback", "Closure", "Constraint"], m: "Heuristics" },
    { q: "A system uses familiar icons like folders and desktops.", a: "Match with real world", o: ["Flexibility", "Match with real world", "Feedback", "Closure"], m: "Heuristics" },
    { q: "A cancel button lets users exit anytime.", a: "User control and freedom", o: ["Feedback", "User control and freedom", "Constraint", "Minimalism"], m: "Heuristics" },
    { q: "A system allows Ctrl+S to save quickly.", a: "Shortcuts", o: ["Feedback", "Shortcuts", "Closure", "Constraint"], m: "Shneiderman" },
    { q: "A checkout process shows “Order Complete” after purchase.", a: "Closure", o: ["Feedback", "Closure", "Consistency", "Error prevention"], m: "Shneiderman" },
    { q: "A system disables unavailable options.", a: "Constraint", o: ["Constraint", "Feedback", "Shortcut", "Closure"], m: "Design" },
    { q: "A system highlights errors in red text.", a: "Feedback", o: ["Feedback", "Closure", "Consistency", "Shortcut"], m: "Design" },
    { q: "Users feel they are controlling the system.", a: "Internal locus of control", o: ["Feedback", "Internal locus of control", "Closure", "Efficiency"], m: "Shneiderman" },
    { q: "Designers interview users before building an app.", a: "Understanding users", o: ["Evaluation", "Understanding users", "Iteration", "Testing"], m: "HCD" },
    { q: "A prototype is tested and redesigned repeatedly.", a: "Iterative design", o: ["Linear process", "Iterative design", "Static design", "Evaluation"], m: "HCD" },
    { q: "A door has a handle suggesting pulling.", a: "Affordance", o: ["Constraint", "Affordance", "Signifier", "Feedback"], m: "Norman" },
    { q: "A label “Push” is placed on a door.", a: "Signifier", o: ["Affordance", "Signifier", "Constraint", "Feedback"], m: "Norman" },
    { q: "A system blocks invalid password formats.", a: "Constraint", o: ["Affordance", "Constraint", "Feedback", "Signifier"], m: "Norman" },
    { q: "Buttons grouped closely are seen as related.", a: "Proximity", o: ["Similarity", "Proximity", "Closure", "Figure-ground"], m: "Gestalt" },
    { q: "Users recognize icons instead of memorizing commands.", a: "Recognition over recall", o: ["Perception", "Memory", "Recognition over recall", "Feedback"], m: "Cognitive" },
    { q: "A user clicks the wrong button accidentally.", a: "Slip", o: ["Mistake", "Slip", "Error", "Constraint"], m: "Cognitive" },
    { q: "A user misunderstands how a feature works.", a: "Mistake", o: ["Slip", "Mistake", "Error", "Feedback"], m: "Cognitive" },
    { q: "Too many menu options slow decision-making.", a: "Hick’s Law", o: ["Cognitive load", "Hick’s Law", "Feedback", "Closure"], m: "Cognitive" },
    { q: "A confusing layout increases mental effort.", a: "Extraneous load", o: ["Intrinsic load", "Extraneous load", "Germane load", "Memory load"], m: "Cognitive" },
    { q: "A difficult task itself causes mental effort.", a: "Intrinsic load", o: ["Intrinsic load", "Extraneous load", "Germane load", "Feedback"], m: "Cognitive" },
    { q: "Learning new concepts requires effort.", a: "Germane", o: ["Intrinsic", "Germane", "Extraneous", "Sensory"], m: "Cognitive" },
    { q: "A design clearly separates foreground and background.", a: "Figure-ground", o: ["Closure", "Figure-ground", "Similarity", "Proximity"], m: "Gestalt" },
    { q: "Users fill missing shapes mentally in UI icons.", a: "Closure", o: ["Similarity", "Closure", "Proximity", "Feedback"], m: "Gestalt" },
    { q: "A system auto-fills previous user data.", a: "Recognition rather than recall", o: ["Recall", "Recognition rather than recall", "Feedback", "Constraint"], m: "Heuristics" },
    { q: "A mobile app vibrates after a button press.", a: "Feedback", o: ["Feedback", "Closure", "Constraint", "Recognition"], m: "Principles" },
    { q: "A confusing interface causes users to quit.", a: "Poor usability", o: ["Good usability", "Poor usability", "Efficiency", "Satisfaction"], m: "Usability" },
    { q: "A system requires memorizing many commands.", a: "Poor usability", o: ["Good design", "Poor usability", "Efficiency", "Feedback"], m: "Usability" },
    { q: "A clean UI with few elements improves:", a: "Efficiency", o: ["Cognitive load", "Efficiency", "Errors", "Complexity"], m: "Usability" },
    { q: "A system adapts to users with disabilities.", a: "Accessibility", o: ["Usability", "Accessibility", "Efficiency", "Feedback"], m: "HCD" },
    { q: "A user quickly completes tasks with shortcuts.", a: "Efficiency", o: ["Learnability", "Efficiency", "Satisfaction", "Feedback"], m: "Usability" },
    { q: "A beginner easily learns how to use an app.", a: "Learnability", o: ["Efficiency", "Learnability", "Feedback", "Closure"], m: "Usability" },
    { q: "Users enjoy using a visually pleasing app.", a: "Satisfaction", o: ["Efficiency", "Satisfaction", "Learnability", "Accessibility"], m: "Usability" },
    { q: "A system reduces user errors through design.", a: "Error prevention", o: ["Feedback", "Error prevention", "Closure", "Shortcut"], m: "Heuristics" },
    { q: "A user forgets how to use a system after a long break. What is lacking?", a: "Memorability", o: ["Learnability", "Memorability", "Efficiency", "Feedback"], m: "Usability" },
    { q: "A system responds instantly after input.", a: "Feedback", o: ["Feedback", "Efficiency", "Closure", "Constraint"], m: "Principles" },
    { q: "A user interface mirrors real-world objects.", a: "Match with real world", o: ["Consistency", "Match with real world", "Feedback", "Closure"], m: "Heuristics" },
    { q: "Too many steps make a task slow.", a: "Efficiency issue", o: ["Efficiency issue", "Feedback issue", "Closure issue", "Constraint issue"], m: "Usability" },
    { q: "A system gives no response after clicking a button.", a: "Lack of feedback", o: ["Error prevention", "Lack of feedback", "Closure", "Recognition"], m: "Principles" },
    { q: "Users rely on icons instead of remembering commands.", a: "Recognition", o: ["Recall", "Recognition", "Feedback", "Constraint"], m: "Cognitive" },
    { q: "A user feels confused and overwhelmed by options.", a: "High cognitive load", o: ["Good UX", "High cognitive load", "Efficiency", "Feedback"], m: "Cognitive" },
    { q: "A system guides users step-by-step through a process.", a: "Visibility of System Status", o: ["Constraint", "Feedback", "Closure", "Visibility of System Status"], m: "Heuristics" },
    { q: "A design prevents wrong actions before they happen.", a: "Error prevention", o: ["Feedback", "Error prevention", "Closure", "Shortcut"], m: "Heuristics" },
    { q: "A system continuously improves based on user testing.", a: "Iterative design", o: ["Static design", "Iterative design", "Linear design", "Fixed design"], m: "HCD" },

    // --- CORE THEORY & HISTORY ITEMS ---
    { q: "Who is the 'Father' of the mouse, demonstrated in 1968?", a: "Douglas Engelbart", o: ["Ivan Sutherland", "Douglas Engelbart", "Jakob Nielsen", "Steve Jobs"], m: "History" },
    { q: "What does WIMP stand for?", a: "Windows, Icons, Menus, Pointer", o: ["Windows, Interface, Mouse, Printer", "Windows, Icons, Menus, Pointer", "Web, Icons, Mouse, Pointer", "Wide, Integrated, Memory, Portal"], m: "History" },
    { q: "Which era was focused on 'Punch Cards' and specialists?", a: "Early Computing (1940s-60s)", o: ["Early Computing (1940s-60s)", "GUI Era", "Touch Era", "Web Era"], m: "History" },
    { q: "Nielsen's attribute for speed of use for expert users:", a: "Efficiency", o: ["Learnability", "Efficiency", "Memorability", "Errors"], m: "Usability" },
    { q: "What concept describes an object's perceived properties that suggest how it can be used?", a: "Affordance", o: ["Affordance", "Constraint", "Feedback", "Mapping"], m: "Norman" },
    { q: "The process of repeating design steps based on evaluation:", a: "Iteration", o: ["Linear design", "Prototyping", "Iteration", "Coding"], m: "HCD" },
    { q: "HIP stands for:", a: "Human Information Processing", o: ["Human Interface Protocol", "Human Information Processing", "Hardware Interaction Power", "High Integrity Processing"], m: "Cognitive" }
];

// Shuffle Questions Utility
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Ensure 100 items by duplicating with markers if pool is small
let quizData = shuffleArray([...rawQuestions]);
while(quizData.length < 100) {
    let clone = {...rawQuestions[Math.floor(Math.random() * rawQuestions.length)]};
    clone.q = "[RECAP] " + clone.q;
    quizData.push(clone);
}
quizData = quizData.slice(0, 100);

let currentIndex = 0;
let correctCount = 0;
let totalAnswered = 0;
let canAnswer = true;

const qMeta = document.getElementById('question-meta');
const qText = document.getElementById('question-text');
const optContainer = document.getElementById('options-container');
const feedback = document.getElementById('feedback-text');
const nextBtn = document.getElementById('next-btn');
const progBar = document.getElementById('progress-bar');
const progText = document.getElementById('progress-text');
const accuracyText = document.getElementById('accuracy-text');
const scoreText = document.getElementById('score-text');

function loadQuestion() {
    if (currentIndex >= quizData.length) {
        showResults();
        return;
    }

    canAnswer = true;
    nextBtn.style.display = 'none';
    feedback.innerText = '';
    
    const data = quizData[currentIndex];
    qMeta.innerText = `CATEGORY: ${data.m.toUpperCase()} | ${currentIndex + 1} OF 100`;
    qText.innerText = data.q;
    
    optContainer.innerHTML = '';
    // Shuffle the options within the button grid
    let shuffledOptions = shuffleArray([...data.o]);
    
    shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, data.a, btn);
        optContainer.appendChild(btn);
    });

    updateStats();
}

function checkAnswer(selected, correct, btn) {
    if (!canAnswer) return;
    canAnswer = false;
    totalAnswered++;

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.classList.add('disabled'));

    if (selected === correct) {
        correctCount++;
        btn.classList.add('correct');
        feedback.innerText = "✓ CORRECT";
        feedback.style.color = "var(--success)";
    } else {
        btn.classList.add('wrong');
        buttons.forEach(b => {
            if (b.innerText === correct) b.classList.add('correct');
        });
        feedback.innerText = "✗ INCORRECT";
        feedback.style.color = "var(--primary)";
    }

    updateStats();
    nextBtn.style.display = 'block';
}

function updateStats() {
    const percent = totalAnswered === 0 ? 0 : Math.round((correctCount / totalAnswered) * 100);
    const progress = (currentIndex / quizData.length) * 100;
    
    progBar.style.width = `${progress}%`;
    progText.innerText = `${currentIndex} / 100`;
    accuracyText.innerText = `${percent}%`;
    scoreText.innerText = correctCount;
}

function nextQuestion() {
    currentIndex++;
    loadQuestion();
}

function showResults() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('quiz-footer').style.display = 'none';
    document.getElementById('quiz-header').style.display = 'none';
    document.getElementById('progress-container').style.display = 'none';
    
    const results = document.getElementById('results-screen');
    results.style.display = 'block';
    
    const percent = Math.round((correctCount / 100) * 100);
    document.getElementById('final-percent').innerText = `${percent}%`;
    document.getElementById('final-stats').innerText = `FINAL SCORE: ${correctCount} / 100 QUESTIONS CORRECT`;
}

// Init
loadQuestion();
</script>

</body>
</html>
