<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI ADVANCED QUIZ - RED EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;800&family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --border: #2d2d2d;
            --primary: #e63946;
            --primary-glow: rgba(230, 57, 70, 0.4);
            --success: #2a9d8f;
            --error: #d62828;
            --text-high: #f1f1f1;
            --text-med: #b0b0b0;
            --text-low: #666666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-high);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(var(--primary-glow) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 5px solid var(--primary);
            padding: 3rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-meta {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-size: 0.9rem;
        }

        #question-text {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .option-btn {
            background: #111;
            border: 1px solid var(--border);
            color: var(--text-med);
            padding: 1.2rem;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            border-color: var(--primary);
            color: var(--text-high);
            background: #1a1a1a;
        }

        .option-btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        .option-btn.wrong {
            background: var(--error) !important;
            color: white;
            border-color: var(--error);
        }

        .footer {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            display: none; /* Hidden until answer selected */
        }

        .next-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #results-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            font-size: 4rem;
            font-family: 'Crimson Pro', serif;
            color: var(--primary);
            margin: 2rem 0;
        }

        .retry-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem 2rem;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
        }

        .retry-btn:hover {
            background: var(--primary);
            color: white;
        }

        .module-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--primary);
            background: rgba(230, 57, 70, 0.1);
            padding: 2px 8px;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div id="game-screen">
            <div class="header">
                <div>
                    <span id="module-label" class="module-tag">MODULE INFO</span>
                    <h1>HCI Assessment</h1>
                </div>
                <div class="progress-meta">
                    QUESTION: <span id="q-current">1</span>/<span id="q-total">25</span>
                </div>
            </div>

            <div id="question-text">Loading question...</div>

            <div class="options-grid" id="options-container">
                <!-- Options will be injected here -->
            </div>

            <div class="footer">
                <div id="feedback" style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;"></div>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question —&gt;</button>
            </div>
        </div>

        <div id="results-screen">
            <h1 style="font-family: 'Crimson Pro', serif; font-size: 3rem;">COMPLETED</h1>
            <p style="color: var(--text-low);">HCI ADVANCED REVIEWER SCORE</p>
            <div class="score-circle" id="final-score">0/0</div>
            <p id="score-commentary" style="margin-bottom: 2rem;"></p>
            <button class="retry-btn" onclick="location.reload()">RESTART ASSESSMENT</button>
        </div>
    </div>

    <script>
        const quizData = [
            // MODULE 1
            {
                module: "MODULE I",
                question: "In the context of HCI goals, what is the definition of 'Effectiveness'?",
                options: [
                    "How quickly a user can complete a task.",
                    "The extent to which a system does what it is supposed to do.",
                    "The user's subjective feeling of pleasure when using the system.",
                    "The ability of a system to prevent physical hardware errors."
                ],
                correct: 1
            },
            {
                module: "MODULE I",
                question: "Which component of HCI refers to the technology, including software, hardware, and mobile apps?",
                options: ["The User", "The Interaction", "The Computer/System", "The Context"],
                correct: 2
            },
            {
                module: "MODULE I",
                question: "HCI aims to reduce 'Cognitive Load'. What does this mean?",
                options: [
                    "Making the computer process data faster.",
                    "Reducing the mental effort required to use a system.",
                    "Increasing the storage capacity of the user's brain.",
                    "Reducing the electricity consumed by the hardware."
                ],
                correct: 1
            },
            // MODULE 2
            {
                module: "MODULE II",
                question: "In the Early Era (1940s-60s), what method was used where tasks were collected and processed all at once without real-time feedback?",
                options: ["Time-Sharing", "WIMP", "Batch Processing", "Direct Manipulation"],
                correct: 2
            },
            {
                module: "MODULE II",
                question: "Who is credited with inventing the Computer Mouse and Hypertext, first demonstrated in 1968?",
                options: ["Ivan Sutherland", "Douglas Engelbart", "Jakob Nielsen", "Don Norman"],
                correct: 1
            },
            {
                module: "MODULE II",
                question: "What does the WIMP acronym stand for in the context of GUI history?",
                options: [
                    "Windows, Icons, Menus, Pointer",
                    "Web, Internet, Mouse, Protocol",
                    "Windows, Interaction, Motion, Programming",
                    "Wide, Integrated, Managed, Processing"
                ],
                correct: 0
            },
            {
                module: "MODULE II",
                question: "What is the primary shift in focus when moving from 'Interface Design' to 'User Experience (UX)'?",
                options: [
                    "Moving from software to hardware.",
                    "Focusing on the emotional and holistic journey of the user.",
                    "Making the code run more efficiently.",
                    "Switching from desktop to mobile only."
                ],
                correct: 1
            },
            // MODULE 3
            {
                module: "MODULE III",
                question: "According to Shneiderman's 8 Golden Rules, 'Undo' and 'Redo' features fall under which category?",
                options: ["Consistency", "Shortcuts", "Easy Reversal of Actions", "Informative Feedback"],
                correct: 2
            },
            {
                module: "MODULE III",
                question: "Which of Nielsen's Heuristics suggests that a 'Trash Bin' icon is effective because it relates to a physical object users know?",
                options: [
                    "Visibility of system status",
                    "Match between system and the real world",
                    "User control and freedom",
                    "Aesthetic and minimalist design"
                ],
                correct: 1
            },
            {
                module: "MODULE III",
                question: "A 'Loading Spinner' or progress bar satisfies which usability heuristic?",
                options: [
                    "Error Prevention",
                    "Flexibility and Efficiency",
                    "Visibility of System Status",
                    "Recognition rather than recall"
                ],
                correct: 2
            },
            {
                module: "MODULE III",
                question: "Nielsen's 'Recognition Rather Than Recall' principle suggests what?",
                options: [
                    "Users should memorize all commands.",
                    "The system should provide visible options so users don't have to remember them.",
                    "The computer should recognize the user's face.",
                    "The user should recall the manual every time they use the app."
                ],
                correct: 1
            },
            // MODULE 4
            {
                module: "MODULE IV",
                question: "According to Don Norman, what is an 'Affordance'?",
                options: [
                    "The cost of a software license.",
                    "The perceived and actual properties of an object that determine how it could be used.",
                    "A label that says 'Push' on a door.",
                    "A mistake made by a user due to bad design."
                ],
                correct: 1
            },
            {
                module: "MODULE IV",
                question: "A 'Push' label on a door is an example of what concept?",
                options: ["Affordance", "Signifier", "Constraint", "Mental Model"],
                correct: 1
            },
            {
                module: "MODULE IV",
                question: "The Human-Centered Design (HCD) process is described as 'Iterative'. What does this mean?",
                options: [
                    "The process is done only once.",
                    "The process is a linear path from start to finish.",
                    "The cycle of design, testing, and improvement is repeated.",
                    "The design is automated by AI."
                ],
                correct: 2
            },
            {
                module: "MODULE IV",
                question: "Which of these is a 'Constraint' in UI design?",
                options: [
                    "A grayed-out 'Submit' button when a form is incomplete.",
                    "A colorful logo.",
                    "A 'Help' documentation link.",
                    "An 'Undo' button."
                ],
                correct: 0
            },
            // MODULE 5
            {
                module: "MODULE V",
                question: "What does Hick's Law state?",
                options: [
                    "The time it takes to make a decision increases with the number and complexity of choices.",
                    "A user can only remember 7 items at a time.",
                    "People prefer red buttons over blue ones.",
                    "Most users leave a website after 3 seconds."
                ],
                correct: 0
            },
            {
                module: "MODULE V",
                question: "Which Gestalt Principle explains why we perceive items placed close together as belonging to the same group?",
                options: ["Similarity", "Closure", "Proximity", "Figure-Ground"],
                correct: 2
            },
            {
                module: "MODULE V",
                question: "In Cognitive Load Theory, which type of load is caused by poor design, like distracting clutter or confusing navigation?",
                options: ["Intrinsic Load", "Extraneous Load", "Germane Load", "Sensory Load"],
                correct: 1
            },
            {
                module: "MODULE V",
                question: "What is the difference between a 'Slip' and a 'Mistake'?",
                options: [
                    "A slip is an accidental action (wrong click); a mistake is a wrong goal (misunderstanding).",
                    "A slip is a hardware error; a mistake is a software bug.",
                    "Slips only happen to experts; mistakes only happen to beginners.",
                    "There is no difference in HCI."
                ],
                correct: 0
            },
            {
                module: "MODULE V",
                question: "Working Memory (Short-Term) is typically limited to how many 'chunks' of information?",
                options: ["1-2 chunks", "3-5 chunks", "10-15 chunks", "Unlimited"],
                correct: 1
            },
            {
                module: "MODULE V",
                question: "Which Gestalt Principle involves the mind's tendency to see complete figures even if data is missing?",
                options: ["Proximity", "Similarity", "Closure", "Continuity"],
                correct: 2
            },
            {
                module: "MODULE I",
                question: "Usability is often measured by which five attributes (Nielsen)?",
                options: [
                    "Cost, Speed, Color, Size, Weight",
                    "Learnability, Efficiency, Memorability, Errors, Satisfaction",
                    "Input, Output, Process, Storage, Feedback",
                    "Hardware, Software, People, Data, Networks"
                ],
                correct: 1
            },
            {
                module: "MODULE II",
                question: "Ivan Sutherland's 1963 'Sketchpad' was significant because it was the first...",
                options: [
                    "Browser",
                    "Graphical User Interface and interactive CAD system",
                    "Operating System",
                    "Word Processor"
                ],
                correct: 1
            },
            {
                module: "MODULE IV",
                question: "In the UCD process, 'Requirement Gathering' focuses on:",
                options: [
                    "Writing the final code.",
                    "Choosing the color palette.",
                    "Identifying user goals, tasks, and limitations.",
                    "Buying new servers."
                ],
                correct: 2
            },
            {
                module: "MODULE V",
                question: "What is the correct order of the Human Information Processing (HIP) model?",
                options: [
                    "Action -> Perception -> Feedback",
                    "Input -> Perception -> Cognition -> Memory -> Decision -> Action",
                    "Memory -> Input -> Decision",
                    "Decision -> Perception -> Input"
                ],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const questionEl = document.getElementById('question-text');
        const optionsEl = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const qCurrentEl = document.getElementById('q-current');
        const qTotalEl = document.getElementById('q-total');
        const moduleLabel = document.getElementById('module-label');
        const feedbackEl = document.getElementById('feedback');

        function initQuiz() {
            qTotalEl.innerText = quizData.length;
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            nextBtn.style.display = 'none';
            feedbackEl.innerText = "";
            
            const q = quizData[currentQuestionIndex];
            moduleLabel.innerText = q.module;
            qCurrentEl.innerText = currentQuestionIndex + 1;
            questionEl.innerText = q.question;
            
            optionsEl.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsEl.appendChild(btn);
            });
        }

        function checkAnswer(index, btn) {
            if (answered) return;
            answered = true;
            
            const correctIndex = quizData[currentQuestionIndex].correct;
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (index === correctIndex) {
                btn.classList.add('correct');
                score++;
                feedbackEl.innerText = "CORRECT. SYSTEMS OPTIMIZED.";
                feedbackEl.style.color = "var(--success)";
            } else {
                btn.classList.add('wrong');
                allBtns[correctIndex].classList.add('correct');
                feedbackEl.innerText = "ERROR. LOGIC MISMATCH.";
                feedbackEl.style.color = "var(--error)";
            }
            
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
            
            let comment = "";
            const percent = (score / quizData.length) * 100;
            if (percent >= 90) comment = "SYSTEM MASTER: HCI EXPERTISE CONFIRMED.";
            else if (percent >= 70) comment = "COMPETENT USER: USABILITY STANDARDS MET.";
            else if (percent >= 50) comment = "RE-ITERATION REQUIRED: LOW SYSTEM COMPATIBILITY.";
            else comment = "SYSTEM FAILURE: COGNITIVE OVERLOAD DETECTED.";
            
            document.getElementById('score-commentary').innerText = comment;
        }

        initQuiz();
    </script>
</body>
</html>
